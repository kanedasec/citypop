map $http_upgrade $citypop_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen __CITYPOP_PORT__ ssl;
    listen [::]:__CITYPOP_PORT__ ssl;
    server_name _;

    ssl_certificate __CITYPOP_CERT__;
    ssl_certificate_key __CITYPOP_KEY__;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:CityPopTLS:1m;
    ssl_session_timeout 10m;

    client_max_body_size 16m;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $citypop_connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
