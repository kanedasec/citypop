map $http_upgrade $citypop_connection_upgrade {
    default upgrade;
    '' close;
}

map $request_uri $citypop_auth_limit_key {
    default "";
    ~^/api/(login|auth/setup)$ $binary_remote_addr;
}

limit_req_zone $citypop_auth_limit_key zone=citypop_auth:1m rate=5r/m;

server {
    listen __CITYPOP_PORT__ ssl;
    listen [::]:__CITYPOP_PORT__ ssl;
    server_name _;

    ssl_certificate __CITYPOP_CERT__;
    ssl_certificate_key __CITYPOP_KEY__;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:CityPopTLS:1m;
    ssl_session_timeout 10m;

    server_tokens off;
    client_max_body_size 1m;
    limit_req zone=citypop_auth burst=4 nodelay;
    limit_req_status 429;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self' wss:; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'; worker-src 'self'; manifest-src 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $citypop_connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
