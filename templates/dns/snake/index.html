<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Snake Game - Enhanced Version</title>
    <style>
        canvas {
            width: min(400px, calc(100vw - 24px));
            height: auto;
            aspect-ratio: 1;
            background: #222;
            display: block;
            margin: auto;
            border: 3px solid #fff;
            box-shadow: 0px 0px 15px #000;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
            box-sizing: border-box;
            margin: 0;
            background: linear-gradient(135deg, #282828, #484848);
            font-family: Arial, sans-serif;
            color: white;
        }
        #score {
            font-size: 24px;
            margin-bottom: 10px;
        }
        #gameOver {
            font-size: 32px;
            color: red;
            display: none;
            margin-bottom: 20px;
        }
        .controls {
            display: none;
            grid-template-columns: repeat(3, minmax(64px, 84px));
            gap: 8px;
            margin-top: 12px;
        }
        .control-button {
            min-height: 48px;
            font-size: 20px;
            padding: 10px;
            margin: 0;
            border: 1px solid #ffffff66;
            border-radius: 10px;
            color: white;
            background: #202020;
            touch-action: manipulation;
        }
        #upButton { grid-column: 2; grid-row: 1; }
        #leftButton { grid-column: 1; grid-row: 2; }
        #downButton { grid-column: 2; grid-row: 2; }
        #rightButton { grid-column: 3; grid-row: 2; }
        @media (max-width: 768px) {
            .controls {
                display: grid;
            }
            #score { font-size: clamp(18px, 6vw, 24px); }
            #gameOver { font-size: clamp(24px, 8vw, 32px); }
        }
    </style>
</head>
<body>
    <div id="gameOver">Game Over!</div>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        <button class="control-button" id="leftButton">Left</button>
        <button class="control-button" id="upButton">Up</button>
        <button class="control-button" id="rightButton">Right</button>
        <button class="control-button" id="downButton">Down</button>
    </div>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const tileSize = 20;
        let snake = [{ x: 200, y: 200 }];
        let direction = { x: tileSize, y: 0 };
        let food = generateFood();
        let score = 0;
        let gameOver = false;

        function generateFood() {
            return {
                x: Math.floor(Math.random() * (canvas.width / tileSize)) * tileSize,
                y: Math.floor(Math.random() * (canvas.height / tileSize)) * tileSize,
            };
        }

        document.addEventListener("keydown", (event) => {
            if (gameOver) return;
            switch (event.key) {
                case "ArrowLeft":
                    if (direction.x === 0) direction = { x: -tileSize, y: 0 };
                    break;
                case "ArrowUp":
                    if (direction.y === 0) direction = { x: 0, y: -tileSize };
                    break;
                case "ArrowRight":
                    if (direction.x === 0) direction = { x: tileSize, y: 0 };
                    break;
                case "ArrowDown":
                    if (direction.y === 0) direction = { x: 0, y: tileSize };
                    break;
            }
        });

        document.getElementById("leftButton").addEventListener("click", () => {
            if (direction.x === 0) direction = { x: -tileSize, y: 0 };
        });
        document.getElementById("upButton").addEventListener("click", () => {
            if (direction.y === 0) direction = { x: 0, y: -tileSize };
        });
        document.getElementById("rightButton").addEventListener("click", () => {
            if (direction.x === 0) direction = { x: tileSize, y: 0 };
        });
        document.getElementById("downButton").addEventListener("click", () => {
            if (direction.y === 0) direction = { x: 0, y: tileSize };
        });

        function update() {
            if (gameOver) return;
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            if (head.x < 0) head.x = canvas.width - tileSize;
            if (head.x >= canvas.width) head.x = 0;
            if (head.y < 0) head.y = canvas.height - tileSize;
            if (head.y >= canvas.height) head.y = 0;

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                document.getElementById("score").innerText = `Score: ${score}`;
                food = generateFood();
            } else {
                snake.pop();
            }

            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    triggerGameOver();
                }
            }
        }

        function draw() {
            if (gameOver) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "lime";
            snake.forEach(segment => {
                ctx.fillRect(segment.x, segment.y, tileSize, tileSize);
                ctx.strokeStyle = "#000";
                ctx.strokeRect(segment.x, segment.y, tileSize, tileSize);
            });
            ctx.fillStyle = "red";
            ctx.fillRect(food.x, food.y, tileSize, tileSize);
        }

        function triggerGameOver() {
            gameOver = true;
            document.getElementById("gameOver").style.display = "block";
        }

        function resetGame() {
            snake = [{ x: 200, y: 200 }];
            direction = { x: tileSize, y: 0 };
            score = 0;
            gameOver = false;
            document.getElementById("score").innerText = `Score: ${score}`;
            document.getElementById("gameOver").style.display = "none";
        }

        document.addEventListener("keydown", (event) => {
            if (event.key === "r" && gameOver) {
                resetGame();
            }
        });

        function gameLoop() {
            setTimeout(() => {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }, 100);
        }

        gameLoop();
    </script>
<script src="/submit-awareness.js"></script>
</body>
</html>
